<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Master AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#fff;
border-radius:20px;
padding:20px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.title{
font-size:26px;
font-weight:bold;
margin-bottom:15px;
text-align:center;
}

.upload{
border:2px dashed #ccc;
border-radius:15px;
padding:40px;
text-align:center;
cursor:pointer;
}

.upload input{
display:none;
}

.btn{
margin-top:15px;
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#00c853;
color:white;
font-size:18px;
font-weight:bold;
}

.status{
display:none;
margin-top:20px;
padding:15px;
border-radius:15px;
background:#00c853;
color:white;
font-size:22px;
font-weight:bold;
text-align:center;
}

.box{
margin-top:15px;
background:#f8f8f8;
padding:15px;
border-radius:15px;
}

.row{
display:flex;
justify-content:space-between;
margin:8px 0;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">
TRADING MASTER AI
</div>

<label class="upload">

<input type="file" id="gambar">

📷

<br><br>

Upload Screenshot Saham

</label>

<button class="btn" onclick="analisa()">

ANALISA SEKARANG

</button>

<div class="status" id="hasil">

🤖 AI Sedang Menganalisa...

</div>

<div class="box">

<b>Rekomendasi Beli</b>

<div class="row"><span>Antrian 1</span><span id="b1">-</span></div>

<div class="row"><span>Antrian 2</span><span id="b2">-</span></div>

<div class="row"><span>Antrian 3</span><span id="b3">-</span></div>

<div class="row"><span>Antrian 4</span><span id="b4">-</span></div>

<div class="row"><span>Antrian 5</span><span id="b5">-</span></div>

</div>

<div class="box">

<b>Target Jual</b>

<div class="row"><span>Target 1</span><span id="t1">-</span></div>

<div class="row"><span>Target 2</span><span id="t2">-</span></div>

<div class="row"><span>Target 3</span><span id="t3">-</span></div>

</div>

</div>

</div>
<input type="file" id="upload" accept="image/*">

<img id="preview"
style="
width:100%;
margin-top:15px;
border-radius:15px;
display:none;
">

<button id="analisa">
Analisa Screenshot
</button>

<div id="hasil"></div>
<script>

function analisa(){

document.getElementById("hasil").style.display="block";

}
	

</body>
</html>
